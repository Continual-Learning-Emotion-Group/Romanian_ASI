# HF TrainingArguments for Romanian ASI day-by-day SFT on Qwen3.5-4B-Instruct.
# Sister of qwen3_5_4b_full_ft.yaml: same hyperparams adjusted for sequential
# per-language training (see pipeline/ft_qwen_day_by_day/train.py).
#
# Key differences from the scrambled config:
# - load_best_model_at_end: false (end-of-day weights are the day-N+1 init)
# - no DeepSpeed (single A100 on tigerfish; we run one GPU at a time)
# - runs_root present (per-day output dirs derived inside the script)

model_name_or_path: Qwen/Qwen3.5-4B
dataset_dir: /local/nlp/aij2115/data/asi_day_by_day
max_seq_length: 1024
attn_implementation: sdpa

runs_root: /local/nlp/aij2115/runs/day_by_day
output_dir: /local/nlp/aij2115/runs/day_by_day  # per-day overridden in script

# --- Optimization ---
bf16: true
tf32: true
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

per_device_train_batch_size: 1
gradient_accumulation_steps: 4          # effective bs = 4 (single GPU)
per_device_eval_batch_size: 4
num_train_epochs: 3                     # per day
learning_rate: 1.0e-5
lr_scheduler_type: cosine
warmup_ratio: 0.03
max_grad_norm: 1.0
weight_decay: 0.0

# --- Scheduling (per day) ---
eval_strategy: epoch
save_strategy: epoch
save_total_limit: 1
load_best_model_at_end: false           # day-by-day: keep end-of-day weights
logging_steps: 5

# --- Reporting ---
report_to: wandb
run_name: qwen3.5-4b-asi-day-by-day-en-es-fa-hi-ro-v1

# --- Determinism ---
seed: 42
data_seed: 42

# --- Misc ---
dataloader_num_workers: 4
remove_unused_columns: false
