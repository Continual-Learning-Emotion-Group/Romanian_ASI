# HF TrainingArguments for Romanian ASI SFT Run #1 on Qwen3.5-4B-Instruct.
# Paths under /local/nlp/aij2115 per the NLP Lab GPU Guide.

model_name_or_path: Qwen/Qwen3.5-4B
dataset_dir: /local/nlp/aij2115/data/asi_multilingual
max_seq_length: 1024
# SDPA dispatches to the Flash Attention 2 kernels on A100 + bf16 and
# avoids a bug in transformers main's qwen3_5 flash_attention integration
# (s_aux is None under grad checkpointing).
attn_implementation: sdpa

output_dir: /local/nlp/aij2115/runs/checkpoints
final_dir: /local/nlp/aij2115/runs/final
logging_dir: /local/nlp/aij2115/runs/logs

# --- Optimization ---
bf16: true
tf32: true
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

per_device_train_batch_size: 8
gradient_accumulation_steps: 1
per_device_eval_batch_size: 16
num_train_epochs: 3
learning_rate: 2.0e-5
lr_scheduler_type: cosine
warmup_ratio: 0.05
max_grad_norm: 1.0
weight_decay: 0.0

# --- Scheduling ---
eval_strategy: steps
eval_steps: 25
save_strategy: steps
save_steps: 25
save_total_limit: 1
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
logging_steps: 5

# --- Reporting ---
report_to: wandb
run_name: qwen3.5-4b-asi-multi-v1

# --- Determinism ---
seed: 42
data_seed: 42

# --- DeepSpeed ---
deepspeed: pipeline/train/configs/deepspeed_zero3.json

# --- Misc ---
dataloader_num_workers: 4
remove_unused_columns: false
